<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trail Finder</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.35);
      z-index: -1;
    }
    body { 
      background-image: url("background.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color:#1f2a1f; 
    }
    .navbar, footer { background:#143d2a; }
    .navbar {
      background: rgba(20, 61, 42, 0.9);
      backdrop-filter: blur(8px);
      border-bottom: 2px solid #050504;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      padding-top: 0px;
      padding-bottom: 0px;
    }
    .navbar-brand img {
      height: 65px;
      width: auto;
    }
    .card { border: 2px solid #060505; border-radius:14px; box-shadow:0 3px 10px #0002; }
    .map-section {
      position: relative;
    }
    #map {
      height: 75vh;
      min-height: 600px;
      width: 100%;
      border-radius: 18px;
      overflow: hidden;
      border: 2px solid #050504
    }
    .overlay-box {
      position: absolute;
      top: 50px;
      right: 50px;
      width: 350px;
      z-index: 1000;
      background: rgb(255, 255, 255, 0.55);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    .trail-img, .modal-img { width:100%; object-fit:cover; }
    .trail-img { height:130px; }
    .modal-img { height:230px; }
    .btn-gold { background:#f2c14e; color:#1f2a1f; border:0; font-weight:bold; }
    .btn-gold:hover { background:#e5b643; color:#1f2a1f; }
    .btn-green { background:#143d2a; color:white; border:0; font-weight:bold; }
    .btn-green:hover { background:#0f2e20; color:white; }
    .result-count { color:#49614f; font-weight:bold; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="#">
        <img src="h!ke.png"
          alt="h!ke logo">
      </a>
      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="navMenu">
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="#">Explore</a>
          <a class="nav-link" href="#trails">Trails</a>
          <a class="nav-link" href="#map">Map</a>
        </div>
      </div>
    </div>
  </nav>
  <section class="map-section position-relative p-4">
    <div id="map"></div>
    <div class="overlay-box card">
      <div class="card-body">
        <h2 class="text-success-emphasis">
          Your adventure awaits
        </h2>
        <p class="small">
          Use quick options or the search bar to find the right trail for you!
        </p>
        <input
          id="search"
          class="form-control mb-3"
          placeholder="Search by name, city, park...">
        <div class="d-flex flex-wrap gap-2">
          <button class="btn btn-gold"
            onclick="setFilter('difficulty','Easy')">
            Easy
          </button>
          <button class="btn btn-gold"
            onclick="setFilter('suitability','Wheelchair-Friendly')">
            Wheelchair
          </button>
          <button class="btn btn-gold"
            onclick="setFilter('suitability','Family-Friendly')">
            Family
          </button>
          <button class="btn btn-outline-secondary"
            onclick="resetFilters()">
            Reset
          </button>
        </div>
      </div>
    </div>
  </section>
  <main id="trails" class="container-fluid px-4 pb-4">
    <div class="row g-4">
      <aside class="col-lg-3">
        <div class="card"><div class="card-body">
          <h3 class="h5 text-success-emphasis">Filters</h3>
          <label class="form-label mt-3">Difficulty</label><select id="difficulty" class="form-select filter"><option>All</option><option>Easy</option><option>Moderate</option><option>Hard</option></select>
          <label class="form-label mt-3">Distance</label><select id="distance" class="form-select filter"><option>All</option><option>0-3 miles</option><option>3-7 miles</option><option>7+ miles</option></select>
          <label class="form-label mt-3">Elevation</label><select id="elevation" class="form-select filter"><option>All</option><option>0-500 feet</option><option>500-1500 feet</option><option>1500+ feet</option></select>
          <label class="form-label mt-3">Route Type</label><select id="route_type" class="form-select filter"><option>All</option><option>loop</option><option>point-to-point</option><option>out & back</option></select>
          <label class="form-label mt-3">Suitability</label><select id="suitability" class="form-select filter"><option>All</option><option>Dog-Friendly</option><option>Wheelchair-Friendly</option><option>Family-Friendly</option><option>Stroller-Friendly</option><option>Photography</option><option>Wildlife</option><option>River</option><option>Fishing</option><option>Waterfalls</option><option>Camping</option><option>Wildflowers</option></select>
        </div></div>
      </aside>
      <section class="col-lg-9">
        <div class="card"><div class="card-body">
          <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
            <h3 class="h5 text-success-emphasis m-0">Popular Trails</h3>
            <p id="resultCount" class="result-count m-0"></p>
          </div>
          <div id="cards" class="row g-3"></div>
          <div class="d-flex justify-content-between mt-4">
            <button class="btn btn-warning" onclick="prevPage()">Previous</button>
            <button class="btn btn-warning" onclick="nextPage()">Next</button>
          </div>
        </div></div>
      </section>
    </div>
  </main>
  <footer class="text-center text-white p-4"><p class="m-0">Designed for easier trail planning, safer visits, and better accessibility.</p></footer>
  <div class="modal fade" id="trailModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered"><div class="modal-content overflow-hidden">
      <img id="modalImg" class="modal-img" alt="Trail image">
      <div class="modal-body">
        <h3 id="modalTitle" class="text-success-emphasis"></h3>
        <p id="modalInfo"></p>
        <button class="btn btn-gold" data-bs-dismiss="modal">Close</button>
      </div>
    </div></div>
  </div>

    const fallback = "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=900&q=80";
    const map = L.map("map").setView([38.16, -119.9], 9);
    const modal = new bootstrap.Modal(document.getElementById("trailModal"));
    let markers = [];

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { attribution:"&copy; OpenStreetMap contributors" }).addTo(map);

    const matches = (t) => {
      const q = search.value.toLowerCase();
      return (
        (!q ||
          t[0].toLowerCase().includes(q) || 
          t[5][0].toLowerCase().includes(q) ||
          t[5][1].toLowerCase().includes(q) || 
          t[6].toLowerCase().includes(q) ||
          t[7].toLowerCase().includes(q) 
        )
        &&
        (difficulty.value === "All" || t[1] === difficulty.value)
        &&
        (distance.value === "All" ||
          (distance.value === "0-3 miles" && parseFloat(t[2]) < 3) ||
          (distance.value === "3-7 miles" &&
            parseFloat(t[2]) >= 3 &&
            parseFloat(t[2]) <= 7) ||
          (distance.value === "7+ miles" &&
            parseFloat(t[2]) > 7)
        )
        &&
        (elevation.value === "All" ||
          (elevation.value === "0-500 feet" &&
            parseInt(t[3].replace(/,/g, "")) < 500) ||
          (elevation.value === "500-1500 feet" &&
            parseInt(t[3].replace(/,/g, "")) >= 500 &&
            parseInt(t[3].replace(/,/g, "")) <= 1500) ||
          (elevation.value === "1500+ feet" &&
            parseInt(t[3].replace(/,/g, "")) > 1500)
        )
        &&
        (route_type.value === "All" ||
          t[4].toLowerCase() === route_type.value.toLowerCase())
        &&
        (suitability.value === "All" ||
          t[8].includes(suitability.value))
      );
    };

    let currentPage = 0;
    const trailsPerPage = 6;

    function show() {
      const list = trails.filter(matches);
      const start = currentPage * trailsPerPage;
      const end = start + trailsPerPage;
      const paginatedList = list.slice(start, end);
      cards.innerHTML = list.length ? "" : `<div class="col-12"><div class="alert alert-light border">No trails match your search. Try clearing one filter.</div></div>`;
      resultCount.textContent = `Showing ${paginatedList.length} of ${trails.length} trails`;
      markers.forEach(m => map.removeLayer(m));
      markers = [];
      paginatedList.forEach(t => {
        const i = trails.indexOf(t);
        cards.innerHTML += `
          <div class="col-md-6 col-xl-4"><div class="card h-100 overflow-hidden">
            <img class="trail-img" src="${t[9]}" alt="${t[0]}" onerror="this.src='${fallback}'">
            <div class="card-body">
              <h5 class="card-title text-success-emphasis">${t[0]}</h5>
              <p class="card-text">${t[1]}<br>${t[2]}<br>${t[5]}</p>
              <button class="btn btn-green btn-sm" onclick="details(${i})">View Details</button>
              <button class="btn btn-outline-success btn-sm" onclick="viewOnMap(${i})">View on Map</button>
            </div>
          </div></div>`;
        const marker = L.marker(t[10]).addTo(map).bindPopup(`${t[0]}<br>${t[1]}<br>${t[3]}<br>${t[4]}`);
        marker.trailIndex = i;
        markers.push(marker);
      });

      fitMap();
    }

    function fitMap() {
      if (markers.length === 1) map.setView(markers[0].getLatLng(), 13);
      if (markers.length > 1) map.fitBounds(L.featureGroup(markers).getBounds(), { padding:[35, 35] });
      setTimeout(() => map.invalidateSize(), 100);
    }

    function viewOnMap(i) {
      const marker = markers.find(m => m.trailIndex === i);
      map.setView(trails[i][10], 14);
      if (marker) marker.openPopup();
      map._container.scrollIntoView({ behavior:"smooth", block:"center" });
      setTimeout(() => map.invalidateSize(), 200);
    }

    function details(i) {
      const t = trails[i];
      modalImg.src = t[9];
      modalImg.onerror = () => modalImg.src = fallback;
      modalTitle.textContent = t[0];
      modalInfo.innerHTML = `Difficulty: ${t[1]}<br>Distance: ${t[2]}<br>Elevation: ${t[3]}<br>Route Type: ${t[4]}<br>Location: ${t[5]}<br>Forest: ${t[6]}<br>Description: ${t[7]}<br>Suitability: ${t[8]}`;
      modal.show();
    }

    function nextPage() {
      const filtered = trails.filter(matches);
      if ((currentPage + 1) * trailsPerPage < filtered.length) {
        currentPage++;
        show();
      }
    }

    function prevPage() {
      if (currentPage > 0) {
        currentPage--;
        show();
      }
    }

    function setFilter(id, value) { resetFilters(false); document.getElementById(id).value = value; show(); }
    function resetFilters(render = true) { search.value = ""; [difficulty, distance, elevation, route_type, suitability].forEach(el => el.value = "All"); if (render) show(); }
    search.addEventListener("input", () => {currentPage = 0; show(); });
    document.querySelectorAll(".filter").forEach(el => {el.addEventListener("change", () => {currentPage = 0; show();});});
    window.addEventListener("load", () => { show(); setTimeout(() => map.invalidateSize(), 300); });
    window.addEventListener("resize", () => map.invalidateSize());
  </script>

</html>
