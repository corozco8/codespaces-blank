<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trail Finder</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    body { background:#f4f6f1; color:#1f2a1f; }
    .navbar, footer { background:#143d2a; }
    .card { border:0; border-radius:14px; box-shadow:0 3px 10px #0002; }
    #map { min-height:350px; border-radius:14px; overflow:hidden; }
    .trail-img, .modal-img { width:100%; object-fit:cover; }
    .trail-img { height:130px; }
    .modal-img { height:230px; }
    .btn-gold { background:#f2c14e; color:#1f2a1f; border:0; font-weight:bold; }
    .btn-gold:hover { background:#e5b643; color:#1f2a1f; }
    .btn-green { background:#143d2a; color:white; border:0; font-weight:bold; }
    .btn-green:hover { background:#0f2e20; color:white; }
    .result-count { color:#49614f; font-weight:bold; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand fw-bold" href="#">Stanislaus Trail Finder</a>
      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="navMenu">
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="#">Explore</a>
          <a class="nav-link" href="#trails">Trails</a>
          <a class="nav-link" href="#map">Map</a>
        </div>
      </div>
    </div>
  </nav>

  <section class="container-fluid p-4">
    <div class="row g-4">
      <div class="col-lg-6">
        <div class="card h-100"><div class="card-body p-4">
          <h1 class="text-success-emphasis">Find the right trail faster.</h1>
          <p>Search trails, filter by difficulty or accessibility, and check basic details before you go.</p>
          <input id="search" class="form-control mb-3" placeholder="Search trails or features">
          <div class="d-flex flex-wrap gap-2">
            <button class="btn btn-gold" onclick="setFilter('difficulty','Easy')">Easy</button>
            <button class="btn btn-gold" onclick="setFilter('feature','Family')">Family</button>
            <button class="btn btn-gold" onclick="setFilter('access','Accessible')">Accessible</button>
            <button class="btn btn-outline-secondary" onclick="resetFilters()">Reset</button>
          </div>
        </div></div>
      </div>
      <div class="col-lg-6">
        <div class="card h-100"><div class="card-body p-3"><div id="map"></div></div></div>
      </div>
    </div>
  </section>

  <main id="trails" class="container-fluid px-4 pb-4">
    <div class="row g-4">
      <aside class="col-lg-3">
        <div class="card"><div class="card-body">
          <h3 class="h5 text-success-emphasis">Filters</h3>
          <label class="form-label mt-2">Difficulty</label><select id="difficulty" class="form-select filter"><option>All</option><option>Easy</option><option>Moderate</option><option>Hard</option></select>
          <label class="form-label mt-3">Accessibility</label><select id="access" class="form-select filter"><option>All</option><option>Accessible</option><option>Limited</option><option>Not Accessible</option></select>
          <label class="form-label mt-3">Feature</label><select id="feature" class="form-select filter"><option>All</option><option>Family</option><option>Lake</option><option>Waterfall</option><option>Scenic</option></select>
        </div></div>
      </aside>

      <section class="col-lg-9">
        <div class="card"><div class="card-body">
          <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
            <h3 class="h5 text-success-emphasis m-0">Popular Trails</h3>
            <p id="resultCount" class="result-count m-0"></p>
          </div>
          <div id="cards" class="row g-3"></div>
        </div></div>
      </section>
    </div>
  </main>

  <footer class="text-center text-white p-4"><p class="m-0">Designed for easier trail planning, safer visits, and better accessibility.</p></footer>

  <div class="modal fade" id="trailModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered"><div class="modal-content overflow-hidden">
      <img id="modalImg" class="modal-img" alt="Trail image">
      <div class="modal-body">
        <h3 id="modalTitle" class="text-success-emphasis"></h3>
        <p id="modalInfo"></p>
        <button class="btn btn-gold" data-bs-dismiss="modal">Close</button>
      </div>
    </div></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const trails = [
      ["Pinecrest Lake Loop", "Moderate", "Limited", "Lake", "3.9 mi", "357 ft", "https://commons.wikimedia.org/wiki/Special:FilePath/Pinecrest%20Lake%20California%201.jpg", [38.1914, -119.9899]],
      ["Columns of the Giants", "Easy", "Accessible", "Family", "0.5 mi", "65 ft", "https://commons.wikimedia.org/wiki/Special:FilePath/Stanislaus%20National%20Forest%20Civil%20Engineers%20%2853108120124%29.jpg", [38.339909, -119.805822]],
      ["Rainbow Pool Trail", "Easy", "Limited", "Waterfall", "0.2 mi", "29 ft", "https://commons.wikimedia.org/wiki/Special:FilePath/Morning%20Rainbow%20Under%20Yosemite%20Falls%20%2871889875%29.jpeg", [37.821474, -120.0051]],
      ["Crabtree Trail to Bear Lake", "Moderate", "Not Accessible", "Lake", "8.0 mi", "931 ft", "https://commons.wikimedia.org/wiki/Special:FilePath/Mosquito%20Lake%20Stanislaus%20National%20Forest.jpg", [38.1725, -119.8844]],
      ["Burst Rock via Gianelli Trail", "Moderate", "Not Accessible", "Scenic", "6.0 mi", "548 ft", "https://commons.wikimedia.org/wiki/Special:FilePath/Stanislaus%20National%20Forest%203N08.jpg", [38.19813, -119.88392]]
    ];

    const fallback = "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=900&q=80";
    const map = L.map("map").setView([38.16, -119.9], 9);
    const modal = new bootstrap.Modal(document.getElementById("trailModal"));
    let markers = [];

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { attribution:"&copy; OpenStreetMap contributors" }).addTo(map);

    const matches = (t) => {
      const q = search.value.toLowerCase();
      return (!q || t[0].toLowerCase().includes(q) || t[3].toLowerCase().includes(q)) &&
        [difficulty, access, feature].every((el, i) => el.value === "All" || t[i + 1] === el.value);
    };

    function show() {
      const list = trails.filter(matches);
      cards.innerHTML = list.length ? "" : `<div class="col-12"><div class="alert alert-light border">No trails match your search. Try clearing one filter.</div></div>`;
      resultCount.textContent = `Showing ${list.length} of ${trails.length} trails`;
      markers.forEach(m => map.removeLayer(m));
      markers = [];

      list.forEach(t => {
        const i = trails.indexOf(t);
        cards.innerHTML += `
          <div class="col-md-6 col-xl-4"><div class="card h-100 overflow-hidden">
            <img class="trail-img" src="${t[6]}" alt="${t[0]}" onerror="this.src='${fallback}'">
            <div class="card-body">
              <h5 class="card-title text-success-emphasis">${t[0]}</h5>
              <p class="card-text">${t[1]}<br>${t[4]}<br>${t[2]}</p>
              <button class="btn btn-green btn-sm" onclick="details(${i})">View Details</button>
              <button class="btn btn-outline-success btn-sm" onclick="viewOnMap(${i})">View on Map</button>
            </div>
          </div></div>`;

        const marker = L.marker(t[7]).addTo(map).bindPopup(`${t[0]}<br>${t[1]}<br>${t[4]}<br>${t[2]}`);
        marker.trailIndex = i;
        markers.push(marker);
      });

      fitMap();
    }

    function fitMap() {
      if (markers.length === 1) map.setView(markers[0].getLatLng(), 13);
      if (markers.length > 1) map.fitBounds(L.featureGroup(markers).getBounds(), { padding:[35, 35] });
      setTimeout(() => map.invalidateSize(), 100);
    }

    function viewOnMap(i) {
      const marker = markers.find(m => m.trailIndex === i);
      map.setView(trails[i][7], 14);
      if (marker) marker.openPopup();
      map._container.scrollIntoView({ behavior:"smooth", block:"center" });
      setTimeout(() => map.invalidateSize(), 200);
    }

    function details(i) {
      const t = trails[i];
      modalImg.src = t[6];
      modalImg.onerror = () => modalImg.src = fallback;
      modalTitle.textContent = t[0];
      modalInfo.innerHTML = `Difficulty: ${t[1]}<br>Accessibility: ${t[2]}<br>Feature: ${t[3]}<br>Distance: ${t[4]}<br>Elevation: ${t[5]}`;
      modal.show();
    }

    function setFilter(id, value) { resetFilters(false); document.getElementById(id).value = value; show(); }
    function resetFilters(render = true) { search.value = ""; [difficulty, access, feature].forEach(el => el.value = "All"); if (render) show(); }

    search.addEventListener("input", show);
    document.querySelectorAll(".filter").forEach(el => el.addEventListener("change", show));
    window.addEventListener("load", () => { show(); setTimeout(() => map.invalidateSize(), 300); });
    window.addEventListener("resize", () => map.invalidateSize());
  </script>
</body>
</html>
